# Nginx config for aigile.lu - proxy to Next.js (Node/PM2) on port 3000

server {
    server_name aigile.lu www.aigile.lu;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/aigile_error.log;
    access_log /var/log/nginx/aigile_access.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/aigile.lu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aigile.lu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.aigile.lu) {
        return 301 https://$host$request_uri;
    }
    if ($host = aigile.lu) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name aigile.lu www.aigile.lu;
    return 404;
}
