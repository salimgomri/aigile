# Première installation : HTTP uniquement (avant Certbot).
# Après : certbot --nginx -d aigile.lu -d www.aigile.lu
# Puis le déploiement copie deploy/nginx-aigile.conf par-dessus.

server {
    listen 80;
    server_name aigile.lu www.aigile.lu;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/aigile_error.log;
    access_log /var/log/nginx/aigile_access.log;
}
