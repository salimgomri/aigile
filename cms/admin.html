<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIgile CMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .login-card {
            max-width: 400px;
            margin: 10% auto;
        }
        
        .header {
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #0066cc, #00a0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0066cc;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0066cc;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .btn {
            background: linear-gradient(135deg, #0066cc, #00a0b0);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: linear-gradient(135deg, #6c757d, #5a6268); }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 4px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .tab.active {
            background: rgba(255, 255, 255, 0.9);
            color: #0066cc;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .article-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #0066cc;
        }
        
        .article-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #0066cc;
        }
        
        .article-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .error { color: #dc3545; margin-top: 15px; text-align: center; }
        .success { color: #28a745; margin-top: 15px; text-align: center; }
        .hidden { display: none; }
        
        .logout-btn {
            position: absolute;
            top: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Écran de connexion -->
        <div id="loginScreen" class="card login-card">
            <h2 style="text-align: center; margin-bottom: 30px;">
                <span style="background: linear-gradient(135deg, #0066cc, #00a0b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AIgile CMS</span>
            </h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="apiKey">Clé API</label>
                    <input type="password" id="apiKey" placeholder="Entrez votre clé API" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
            </form>
            <div id="loginError" class="error hidden">Clé API incorrecte</div>
        </div>

        <!-- Interface principale -->
        <div id="mainInterface" class="hidden">
            <div class="header card">
                <h1>AIgile CMS</h1>
                <p>Gestionnaire d'articles pour votre manifeste AIgile</p>
                <button onclick="logout()" class="btn btn-secondary logout-btn">Déconnexion</button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="showTab('create')">Créer un Article</div>
                <div class="tab" onclick="showTab('list')">Liste des Articles</div>
            </div>

            <!-- Onglet Création -->
            <div class="tab-content active" id="create">
                <div class="card">
                    <h2>Nouvel Article</h2>
                    <form id="articleForm">
                        <div class="form-group">
                            <label for="title">Titre</label>
                            <input type="text" id="title" required>
                        </div>

                        <div class="form-group">
                            <label for="excerpt">Résumé</label>
                            <textarea id="excerpt" rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="content">Contenu (Markdown)</label>
                            <textarea id="content" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="principle">Principe AIgile</label>
                            <select id="principle">
                                <option value="">Aucun</option>
                                <option value="value-1-individuals">Valeur 1 : Individus et interactions</option>
                                <option value="value-2-working-software">Valeur 2 : Logiciel fonctionnel</option>
                                <option value="value-3-customer-collaboration">Valeur 3 : Collaboration client</option>
                                <option value="value-4-responding-change">Valeur 4 : Répondre au changement</option>
                                <option value="principle-1-economic-view">Principe 1 : Vue économique augmentée</option>
                                <option value="principle-2-systems-thinking">Principe 2 : Pensée systémique assistée</option>
                                <option value="principle-3-variability">Principe 3 : Variabilité avec options IA</option>
                                <option value="principle-4-incremental">Principe 4 : Construction incrémentale</option>
                                <option value="principle-5-milestones">Principe 5 : Jalons basés sur systèmes IA</option>
                                <option value="principle-6-visualize-wip">Principe 6 : Visualiser WIP avec insights IA</option>
                                <option value="principle-7-cadence-sync">Principe 7 : Cadence et sync avec IA</option>
                                <option value="principle-8-motivation">Principe 8 : Motivation amplifiée par IA</option>
                                <option value="principle-9-decentralize">Principe 9 : Décisions enrichies par IA</option>
                                <option value="principle-10-organize-value">Principe 10 : Organisation avec équipes augmentées</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="tags">Tags (séparés par des virgules)</label>
                            <input type="text" id="tags" placeholder="AIgile, Transformation, Leadership">
                        </div>

                        <div class="form-group">
                            <label for="linkedinUrl">URL LinkedIn</label>
                            <input type="url" id="linkedinUrl">
                        </div>

                        <button type="submit" class="btn">Créer l'Article</button>
                    </form>
                    <div id="createMessage"></div>
                </div>
            </div>

            <!-- Onglet Liste -->
            <div class="tab-content" id="list">
                <div class="card">
                    <h2>Articles publiés</h2>
                    <div id="articlesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = '';
        const API_BASE = '/cms/';

        // Gestion de l'authentification
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            apiKey = document.getElementById('apiKey').value;
            
            // Test de la clé API
            fetch(API_BASE + 'articles', {
                headers: { 'Authorization': 'Bearer ' + apiKey }
            })
            .then(response => {
                if (response.ok) {
                    showMainInterface();
                } else {
                    showError('loginError');
                }
            })
            .catch(() => showError('loginError'));
        });

        function showError(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function hideError(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function showMainInterface() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainInterface').classList.remove('hidden');
            hideError('loginError');
            loadArticles();
        }

        function logout() {
            apiKey = '';
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainInterface').classList.add('hidden');
            document.getElementById('apiKey').value = '';
        }

        // Gestion des onglets
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'list') {
                loadArticles();
            }
        }

        // Création d'articles
        document.getElementById('articleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const articleData = {
                title: document.getElementById('title').value,
                excerpt: document.getElementById('excerpt').value,
                content: document.getElementById('content').value,
                principle: document.getElementById('principle').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                linkedinUrl: document.getElementById('linkedinUrl').value
            };

            fetch(API_BASE + 'articles', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify(articleData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('createMessage').innerHTML = '<div class="success">Article créé avec succès !</div>';
                    document.getElementById('articleForm').reset();
                    setTimeout(() => {
                        document.getElementById('createMessage').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('createMessage').innerHTML = '<div class="error">Erreur : ' + data.error + '</div>';
                }
            })
            .catch(error => {
                document.getElementById('createMessage').innerHTML = '<div class="error">Erreur de connexion</div>';
            });
        });

        // Chargement des articles
        function loadArticles() {
            fetch(API_BASE + 'articles')
            .then(response => response.json())
            .then(articles => {
                const listDiv = document.getElementById('articlesList');
                
                if (articles.length === 0) {
                    listDiv.innerHTML = '<p>Aucun article publié.</p>';
                    return;
                }
                
                listDiv.innerHTML = articles.map(article => `
                    <div class="article-item">
                        <div class="article-title">${article.title}</div>
                        <div class="article-meta">
                            ${new Date(article.publishedAt).toLocaleDateString('fr-FR')} 
                            • ${article.readingTime} min
                            ${article.principle ? '• ' + article.principle : ''}
                        </div>
                        <div>${article.excerpt}</div>
                        ${article.tags.length > 0 ? '<div style="margin-top: 10px;">' + article.tags.map(tag => `<span style="background: #e3f2fd; color: #1976d2; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; margin-right: 5px;">${tag}</span>`).join('') + '</div>' : ''}
                    </div>
                `).join('');
            })
            .catch(error => {
                document.getElementById('articlesList').innerHTML = '<div class="error">Erreur lors du chargement</div>';
            });
        }
    </script>
</body>
</html>
